<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Bons Achados — Gerador de Links</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --green:#A8D5A2; --green-dark:#5A8A55; --pink:#D4679A; --pink-light:#F7EEF4; --pink-border:#D4A0C0; --white:#fff; --gray:#888; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Nunito',sans-serif; background:var(--green); min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; padding:24px 16px; }
    .card { background:var(--white); border-radius:24px; padding:28px 24px; width:100%; max-width:420px; border:2px solid var(--pink-border); }
    .header { display:flex; align-items:center; gap:12px; margin-bottom:20px; padding-bottom:16px; border-bottom:1px solid #F0E0E8; }
    .logo { width:52px; height:52px; border-radius:50%; object-fit:cover; border:2px solid var(--pink-border); flex-shrink:0; }
    .header-text h1 { font-size:17px; font-weight:800; color:var(--pink); }
    .header-text p { font-size:12px; color:var(--gray); margin-top:2px; }
    .stitle { font-size:12px; font-weight:700; color:var(--green-dark); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }
    .cupom-inativo { display:flex; align-items:center; gap:8px; padding:10px 14px; border-radius:12px; background:#F5F5F5; border:1.5px dashed #DDD; font-size:13px; color:#999; font-weight:700; margin-bottom:16px; }
    .cupom-ativo-label { font-size:12px; font-weight:700; color:#2E7D32; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }
    .cupom-img { width:100%; border-radius:12px; border:1.5px solid #A5D6A7; display:block; margin-bottom:16px; }
    .input-wrap { display:flex; gap:8px; margin-bottom:16px; }
    input[type="text"] { flex:1; padding:12px 14px; border:1.5px solid var(--pink-border); border-radius:12px; font-family:'Nunito',sans-serif; font-size:13px; outline:none; }
    input[type="text"]:focus { border-color:var(--pink); }
    input[type="text"]::placeholder { color:#CCC; }
    .btn-conv { background:var(--pink); color:#fff; border:none; border-radius:12px; padding:12px 18px; font-family:'Nunito',sans-serif; font-size:13px; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:6px; white-space:nowrap; }
    .btn-conv:disabled { opacity:0.6; cursor:not-allowed; }
    .spinner { width:14px; height:14px; border:2px solid rgba(255,255,255,0.4); border-top-color:#fff; border-radius:50%; animation:spin 0.7s linear infinite; display:none; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .result-box { display:none; flex-direction:column; gap:10px; }
    .result-link { background:var(--pink-light); border:1.5px solid var(--pink-border); border-radius:12px; padding:12px 14px; font-size:12px; color:var(--pink); word-break:break-all; font-weight:600; }
    .btn-row { display:flex; gap:8px; }
    .btn-copy { flex:1; background:var(--white); color:var(--pink); border:1.5px solid var(--pink-border); border-radius:12px; padding:11px; font-family:'Nunito',sans-serif; font-size:13px; font-weight:700; cursor:pointer; }
    .btn-open { flex:1; background:#25D366; color:#fff; border:none; border-radius:12px; padding:11px; font-family:'Nunito',sans-serif; font-size:13px; font-weight:700; cursor:pointer; text-decoration:none; display:flex; align-items:center; justify-content:center; gap:5px; }
    .error-box { display:none; background:#FFEBEE; border:1.5px solid #FFCDD2; border-radius:12px; padding:12px 14px; font-size:13px; color:#C62828; font-weight:600; margin-bottom:12px; }
    .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:#333; color:#fff; padding:10px 20px; border-radius:20px; font-size:13px; font-family:'Nunito',sans-serif; font-weight:700; transition:transform 0.3s ease; z-index:999; }
    .toast.show { transform:translateX(-50%) translateY(0); }
  </style>
</head>

      <div class="header-text"><h1>Gerador de Links</h1><p>Bons Achados — Converta e economize!</p></div>
    </div>
    <div id="cupomInativo" class="cupom-inativo">🏷️ Nenhum cupom no momento</div>
    <div id="cupomAtivo" style="display:none;">
      <div class="cupom-ativo-label">✅ Cupom ativo no momento!</div>
      <img class="cupom-img" id="cupomImg" src="" alt="Cupom">
    </div>
    <div class="stitle">Cole o link do produto</div>
    <div class="input-wrap">
      <input type="text" id="linkInput" placeholder="https://shopee.com.br/produto...">
      <button class="btn-conv" id="btnConvert" onclick="converter()">
        <div class="spinner" id="spinner"></div>
        <span id="btnText">Gerar</span>
      </button>
    </div>
    <div class="error-box" id="errorBox"></div>
    <div class="result-box" id="resultBox">
      <div class="stitle">Link gerado</div>
      <div class="result-link" id="resultLink"></div>
      <div class="btn-row">
        <button class="btn-copy" onclick="copiarLink()">📋 Copiar link</button>
        <a class="btn-open" id="btnOpen" href="#" target="_blank">🛍️ Abrir produto</a>
      </div>
    </div>
  </div>
  <div class="toast" id="toast">✅ Link copiado!</div>
  <script>
    var currentLink = '';
    async function carregarCupom() {
      try {
        var r = await fetch('/api/cupom?t=' + Date.now(), {cache:'no-store'});
        var d = await r.json();
        if (d.ativo && d.imagem) {
          document.getElementById('cupomInativo').style.display = 'none';
          document.getElementById('cupomImg').src = d.imagem;
          document.getElementById('cupomAtivo').style.display = 'block';
        } else {
          document.getElementById('cupomInativo').style.display = 'flex';
          document.getElementById('cupomAtivo').style.display = 'none';
        }
      } catch(e) {}
    }
    async function converter() {
      var input = document.getElementById('linkInput').value.trim();
      if (!input) return showError('Cole um link da Shopee para converter.');
      setLoading(true); hideError(); hideResult();
      try {
        var res = await fetch('/api/convert', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({link:input})});
        var data = await res.json();
        if (!res.ok || !data.success) { showError(data.error || 'Erro ao converter.'); return; }
        currentLink = data.converted_link;
        document.getElementById('resultLink').textContent = currentLink;
        document.getElementById('btnOpen').href = currentLink;
        document.getElementById('resultBox').style.display = 'flex';
      } catch(e) { showError('Erro de conexão.'); } finally { setLoading(false); }
    }
    function setLoading(v) {
      document.getElementById('btnConvert').disabled = v;
      document.getElementById('spinner').style.display = v ? 'block' : 'none';
      document.getElementById('btnText').textContent = v ? '' : 'Gerar';
    }
    function hideResult() { document.getElementById('resultBox').style.display = 'none'; }
    function showError(msg) { var el = document.getElementById('errorBox'); el.textContent = '⚠️ ' + msg; el.style.display = 'block'; }
    function hideError() { document.getElementById('errorBox').style.display = 'none'; }
    function copiarLink() { navigator.clipboard.writeText(currentLink).then(function() { showToast(); }); }
    function showToast() { var t = document.getElementById('toast'); t.classList.add('show'); setTimeout(function() { t.classList.remove('show'); }, 2000); }
    document.getElementById('linkInput').addEventListener('keypress', function(e) { if (e.key === 'Enter') converter(); });
    carregarCupom();
  </script>
</body>
